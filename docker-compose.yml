version: '3.8'

services:
  db:
    image: postgres:16
    container_name: eurostat_postgres
    restart: always
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data

  etl:
    build: .
    container_name: eurostat_etl
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    command: >
      sh -c "
        uv sync --frozen --no-dev &&
        echo 'Waiting for PostgreSQL...' &&
        sleep 10 &&
        echo 'Running ETL Pipeline...' &&
        uv run python -m backend.etl.main --mode full-refresh &&
        echo 'Generating Visualizations...' &&
        uv run python -m backend.viz.viz_utils
      "

  backend:
    build: .
    container_name: eurostat_backend
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - FRONTEND_ORIGIN=http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "uv sync --frozen --no-dev && uv run uvicorn backend.api.main:app --host 0.0.0.0 --port 8000"

  frontend:
    image: node:20-alpine
    container_name: eurostat_frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    working_dir: /app/frontend
    volumes:
      - .:/app
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    ports:
      - "5050:80"
    env_file:
      - .env
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    depends_on:
      - db

volumes:
  pgdata: