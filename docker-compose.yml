services:

  db:
    image: postgres:16
    container_name: eurostat_postgres
    restart: always
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-energy_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-energy_pass}
      - POSTGRES_DB=${POSTGRES_DB:-energy}
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-energy_user} -d ${POSTGRES_DB:-energy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  etl:
    build: .
    container_name: eurostat_etl
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    command: >
      sh -c "
        uv sync --frozen --no-dev &&
        echo 'PostgreSQL is ready. Running ETL Pipeline...' &&
        uv run python -m backend.etl.main --mode full-refresh &&
        echo 'Generating Visualizations...' &&
        uv run python -m backend.viz.viz_utils
      "

  backend:
    build: .
    container_name: eurostat_backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - FRONTEND_ORIGIN=http://localhost:5173
      - DB_USER=${DB_USER:-energy_user}
      - DB_PASS=${DB_PASS:-energy_pass}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-energy}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "uv sync --frozen --no-dev && uv run uvicorn backend.api.main:app --host 0.0.0.0 --port 8000"

  frontend:
    image: node:20-alpine
    container_name: eurostat_frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    working_dir: /app/frontend
    volumes:
      - .:/app
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    ports:
      - "5050:80"
    env_file:
      - .env
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    depends_on:
      - db

volumes:
  pgdata: